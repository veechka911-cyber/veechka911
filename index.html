<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a4d68">
<meta name="description" content="Офтальмологический амбулаторный справочник — диагнозы, препараты, алгоритмы. Работает офлайн.">
<title>Офтальмо — амбулаторный справочник</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body data-theme="light">

<header class="app-header">
  <button id="backBtn" class="icon-btn" aria-label="Назад" style="display:none">←</button>
  <h1 id="title">Офтальмо</h1>
  <span id="offBadge" class="badge off" title="Состояние офлайн-кэша">кэш</span>
  <button id="themeBtn" class="icon-btn" aria-label="Тема">◐</button>
</header>

<div class="search-wrap">
  <input id="search" type="search" placeholder="Поиск: диагноз, МКБ, препарат, симптом…" autocomplete="off" inputmode="search">
  <button id="clearBtn" class="clear-btn" aria-label="Очистить" style="display:none">✕</button>
</div>

<main id="view"></main>

<button id="installBtn" class="install-btn" style="display:none">📲 Установить</button>

<nav class="bottom-nav" role="navigation">
  <button class="bn-btn" data-nav="diagnoses"><span class="ic">🩺</span><span>Диагнозы</span></button>
  <button class="bn-btn" data-nav="drugs"><span class="ic">💊</span><span>Препараты</span></button>
  <button class="bn-btn" data-nav="algorithms"><span class="ic">⚡</span><span>Алгоритмы</span></button>
  <button class="bn-btn" data-nav="scales"><span class="ic">📏</span><span>Шкалы</span></button>
  <button class="bn-btn" data-nav="misc"><span class="ic">⋯</span><span>Ещё</span></button>
</nav>

<script src="data/icd10.js"></script>
<script src="data/scales.js"></script>
<script src="data/abbreviations.js"></script>
<script src="data/algorithms.js"></script>
<script src="data/drugs.js"></script>
<script src="data/diagnoses.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(() => {
      document.getElementById('offBadge').textContent = 'офлайн ✓';
      document.getElementById('offBadge').classList.remove('off');
    }).catch(() => {});
  });
}
</script>

</body>
</html>
